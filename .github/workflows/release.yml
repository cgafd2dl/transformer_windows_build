name: Remote Build and Release

on:
  push:
    tags:
      - 'v*' # Triggers on tags starting with 'v' (e.g., v1.0.1)

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout This Repo
        uses: actions/checkout@v4

      # 1. Clone the external repository
      - name: Clone Target Repo
        run: |
          git clone https://github.com/ForTheCommunity/Transformer.git target_project

      # 2. Setup Rust
      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          targets: x86_64-pc-windows-msvc

      # 3. Build the cloned project
      - name: Build for Windows
        run: |
          cd target_project
          cargo build --release --target x86_64-pc-windows-msvc

      # 4. Package Artifacts and Generate Checksum
      - name: Package Artifact
        shell: pwsh
        run: |
          # Create distribution directory
          New-Item -Path "dist" -ItemType Directory -Force
          
          # Copy the .exe files
          Copy-Item "target_project/target/x86_64-pc-windows-msvc/release/*.exe" -Destination "dist/"
          
          # Generate SHA256 checksums for all .exe files in the dist folder
          Get-ChildItem "dist/*.exe" | ForEach-Object {
              $hash = Get-FileHash $_.FullName -Algorithm SHA256
              "$($hash.Hash)  $($_.Name)" | Out-File -FilePath "dist/sha256.txt" -Append -Encoding ascii
          }

      # 5. Create GitHub Release and Upload Files
      - name: Create Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          # This will upload both the .exe and the sha256.txt
          files: |
            dist/*.exe
            dist/sha256.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}